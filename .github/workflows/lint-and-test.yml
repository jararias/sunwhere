name: lint-and-test

# on: [push, pull_request]
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      matrix:  # esto permite ejecutar el mismo job en distintas versiones
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false  # para que no se cancelen todos si uno falla

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Instala uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Muestra la version de Python
      run: uv run python -V

    # en realidad, solo hace falta correr ruff una vez, pero aqui se revisa para cada version en la matriz
    - name: Ejecuta ruff (lint)
      run: uvx ruff check --output-format=github .

    - name: Instala dependencias
      run: uv sync

    - name: Ejecuta los tests y coverage
      run: uv run make tests
